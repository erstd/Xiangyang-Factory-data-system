name: Build Mac Executable

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 使用 3.11，彻底避免链接问题
      
      - run: |
          pip install pyqt5 pyinstaller
          pyinstaller --onefile --windowed \
            --name="货物加工系统" \
            --add-data "database.db:." \
            main.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: 货物加工系统-Mac-${{ github.event.inputs.version }}
          path: dist/货物加工系统